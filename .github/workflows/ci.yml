name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Test (stable features)
        working-directory: java17-features-demo
        run: ./mvnw -B test
      - name: Test (preview features)
        working-directory: java17-features-demo
        run: ./mvnw -B -Ppreview test
